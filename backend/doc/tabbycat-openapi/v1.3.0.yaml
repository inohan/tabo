      enum:
      - C
      - I
      - D
      - d
      - t
      - w
      - R
      - A
      type: string
      description: |-
        * `C` - Capped
        * `I` - Ineligible
        * `D` - Different break
        * `d` - Disqualified
        * `t` - Lost coin toss
        * `w` - Withdrawn
        * `R` - Reserve
        * `A` - Absent
