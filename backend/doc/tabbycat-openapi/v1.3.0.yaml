      - v1
    Round:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        break_category:
          type: string
          format: uri
          nullable: true
        motions:
          type: array
          items:
            $ref: '#/components/schemas/RoundMotion'
        starts_at:
          type: string
          format: date-time
          nullable: true
        motions_released:
          type: boolean
          nullable: true
        _links:
          allOf:
          - $ref: '#/components/schemas/RoundLinks'
          readOnly: true
          title: ' links'
        seq:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Sequence number
          description: A number that determines the order of the round, should count
            consecutively from 1 for the first round
        completed:
          type: boolean
          description: True if the round is over, which normally means all results
            have been entered and confirmed
        name:
          type: string
          description: e.g. "Round 1"
          maxLength: 40
        abbreviation:
          type: string
          description: e.g. "R1"
          maxLength: 10
        stage:
          allOf:
          - $ref: '#/components/schemas/StageEnum'
          description: |-
            Preliminary = inrounds, elimination = outrounds

            * `P` - Preliminary
            * `E` - Elimination
        draw_type:
          allOf:
          - $ref: '#/components/schemas/DrawTypeEnum'
          description: |-
            Which draw method to use

            * `R` - Random
            * `M` - Manual
            * `D` - Round-robin
            * `P` - Power-paired
            * `E` - Elimination
            * `S` - Seeded
        draw_status:
          allOf:
          - $ref: '#/components/schemas/DrawStatusEnum'
          description: |-
            The status of this round's draw

            * `N` - None
            * `D` - Draft
            * `C` - Confirmed
            * `T` - Teams released
            * `R` - Released
        feedback_weight:
          type: number
          format: double
          description: The extent to which each adjudicator's overall score depends
            on feedback vs their base score. At 0, it is 100% drawn from their base
            score, at 1 it is 100% drawn from feedback.
        silent:
          type: boolean
          description: If marked silent, information about this round (such as its
            results) will not be shown publicly.
        motions_status:
          allOf:
          - $ref: '#/components/schemas/MotionsStatusEnum'
          description: |-
            The release status of motions for this round

            * `N` - Not released
            * `I` - Info-slides released
            * `M` - Motions released
        weight:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: A factor for the points received in the round. For example,
            if 2, all points are doubled.
      required:
      - _links
      - abbreviation
      - draw_type
      - id
      - name
      - seq
      - url
