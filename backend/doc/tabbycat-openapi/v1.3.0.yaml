    NullEnum:
      enum:
      - null
    OddBracketEnum:
      enum:
      - pullup_top
      - pullup_bottom
      - pullup_middle
      - pullup_random
      - intermediate
      - intermediate_bubble_up_down
      - intermediate1
      - intermediate2
      - pullup_lowest_ds_rank
      - pullup_lowest_ds_rank_npulls
      type: string
      description: |-
        * `pullup_top` - Pull up from top
        * `pullup_bottom` - Pull up from bottom
        * `pullup_middle` - Pull up from middle
        * `pullup_random` - Pull up at random
        * `intermediate` - Intermediate brackets
        * `intermediate_bubble_up_down` - Intermediate brackets with bubble-up-bubble-down
        * `intermediate1` - Intermediate 1 (pre-allocated sides)
        * `intermediate2` - Intermediate 2 (pre-allocated sides)
        * `pullup_lowest_ds_rank` - Pull up from the lowest draw strength by rank
        * `pullup_lowest_ds_rank_npulls` - Pull up from the least pulled up, then the lowest draw strength by rank
    Options:
      type: object
      properties:
        avoid_institution:
          type: boolean
        avoid_history:
          type: boolean
        history_penalty:
          type: integer
        institution_penalty:
          type: integer
        pullup_debates_penalty:
          type: integer
        side_penalty:
          type: integer
        pairing_penalty:
          type: integer
        side_allocations:
          allOf:
          - $ref: '#/components/schemas/SideAllocationsEnum'
          description: |-
            How affirmative/negative positions are assigned (see documentation for further details)

            * `random` - Random
            * `balance` - Balance
            * `preallocated` - Pre-allocated
            * `manual-ballot` - Manually enter from ballot
        avoid_conflicts:
          allOf:
          - $ref: '#/components/schemas/AvoidConflictsEnum'
          description: |-
            Method used to try to avoid teams facing each other multiple times or their own institution (see documentation for further details)

            * `off` - Off
            * `one_up_one_down` - One-up-one-down
            * `graph` - Minimum cost matching (pullups determined beforehand)
            * `graph_one` - Minimum cost matching (including pullups)
        odd_bracket:
          allOf:
          - $ref: '#/components/schemas/OddBracketEnum'
          description: |-
            How odd brackets are resolved (see documentation for further details)

            * `pullup_top` - Pull up from top
            * `pullup_bottom` - Pull up from bottom
            * `pullup_middle` - Pull up from middle
            * `pullup_random` - Pull up at random
            * `intermediate` - Intermediate brackets
            * `intermediate_bubble_up_down` - Intermediate brackets with bubble-up-bubble-down
            * `intermediate1` - Intermediate 1 (pre-allocated sides)
            * `intermediate2` - Intermediate 2 (pre-allocated sides)
            * `pullup_lowest_ds_rank` - Pull up from the lowest draw strength by rank
            * `pullup_lowest_ds_rank_npulls` - Pull up from the least pulled up, then the lowest draw strength by rank
        pairing_method:
          allOf:
          - $ref: '#/components/schemas/PairingMethodEnum'
          description: |-
            Slide: 1 vs 6, 2 vs 7, …. Fold: 1 vs 10, 2 vs 9, …. Adjacent: 1 vs 2, 3 vs 4, ….

            * `slide` - Slide
            * `fold` - Fold
            * `random` - Random
            * `adjacent` - Adjacent
            * `fold_top_adjacent_rest` - Fold top, adjacent rest
        pullup_restriction:
          allOf:
          - $ref: '#/components/schemas/PullupRestrictionEnum'
          description: |-
            If using pull-ups, restrict which teams can be pulled up. Two-team formats only. Has no effect on BP or intermediate brackets.

            * `none` - No restriction
            * `least_to_date` - Choose from teams who have been pulled up the fewest times so far
            * `lowest_ds_wins` - Choose from teams with the lowest draw strength by wins so far
            * `lowest_ds_speaks` - Choose from teams with the lowest draw strength by speaks so far
        pullup:
          allOf:
          - $ref: '#/components/schemas/PullupEnum'
          description: |-
            In BP, how pullups are distributed. Only "Anywhere" is WUDC-compliant.

            * `anywhere` - Anywhere in bracket
            * `one_room` - All in the same room (not WUDC-compliant)
        position_cost:
          allOf:
          - $ref: '#/components/schemas/PositionCostEnum'
          description: |-
            In BP, which position cost function to use (see documentation for details)

            * `simple` - Simple
            * `entropy` - Rényi entropy
            * `variance` - Population variance
        assignment_method:
          allOf:
          - $ref: '#/components/schemas/AssignmentMethodEnum'
          description: |-
            In BP, which method to use to solve the assignment problem. Only Hungarian with preshuffling is WUDC-compliant.

            * `hungarian` - Hungarian algorithm (not WUDC-compliant)
            * `hungarian_preshuffled` - Hungarian algorithm with preshuffling
        renyi_order:
          type: number
          format: double
        exponent:
          type: number
          format: double
        max_times_on_one_side:
          type: integer
          minimum: 0
        pullup_penalty:
          type: integer
          minimum: 0
