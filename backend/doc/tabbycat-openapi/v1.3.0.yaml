      operationId: api_v1_users_retrieve
      summary: Get user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The object's primary key
        required: true
      tags:
      - users
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    post:
      operationId: api_v1_users_create_2
      summary: Update user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The object's primary key
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: api_v1_users_partial_update
      summary: Patch user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The object's primary key
        required: true
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUser'
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: api_v1_users_destroy
      summary: Deactivate user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The object's primary key
        required: true
      tags:
      - users
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/users/me:
    get:
      operationId: api_v1_users_me_retrieve
      summary: Get own user information
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: The object's primary key
        required: true
      tags:
      - users
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
components:
  schemas:
    AdjAnswer:
      type: object
      properties:
        question:
          type: string
          format: uri
        answer:
          anyOf:
          - type: number
          - type: boolean
          - type: string
          - type: array
            items:
              type: string
      required:
      - answer
      - question
    Adjudicator:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        name:
          type: string
        institution:
          type: string
          format: uri
          nullable: true
        institution_conflicts:
          type: array
          items:
            type: string
            format: uri
        team_conflicts:
          type: array
          items:
            type: string
            format: uri
        adjudicator_conflicts:
          type: array
          items:
            type: string
            format: uri
        venue_constraints:
          type: array
          items:
            $ref: '#/components/schemas/VenueConstraint'
        _links:
          allOf:
          - $ref: '#/components/schemas/AdjudicatorLinks'
          readOnly: true
          title: ' links'
        barcode:
          type: string
          nullable: true
        answers:
          type: array
          items:
            $ref: '#/components/schemas/Answer'
        last_name:
          type: string
          nullable: true
          description: The last name may be used for team names or code names
          maxLength: 70
        email:
          type: string
          format: email
          nullable: true
          title: Email address
          maxLength: 254
        phone:
          type: string
          maxLength: 40
        anonymous:
          type: boolean
          description: Anonymous persons will have their name and team redacted on
            public tab releases
        code_name:
          type: string
          description: Name used to obscure real name on public-facing pages
          maxLength: 25
        url_key:
          type: string
          nullable: true
          maxLength: 24
          pattern: ^[-a-zA-Z0-9_]+$
        gender:
          description: |-
            Gender is displayed in the adjudicator allocation interface, and nowhere else

            * `M` - male
            * `F` - female
            * `O` - other
          oneOf:
          - $ref: '#/components/schemas/GenderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        pronoun:
          type: string
          description: If printing ballots using Tabbycat, there is the option to
            pre-print pronouns
          maxLength: 10
        base_score:
          type: number
          format: double
        trainee:
          type: boolean
          title: Always trainee
          description: If checked, this adjudicator will never be auto-allocated a
            voting position, regardless of their score
        breaking:
          type: boolean
        independent:
          type: boolean
        adj_core:
          type: boolean
          title: Adjudication core
      required:
      - _links
      - adjudicator_conflicts
      - id
      - institution
      - institution_conflicts
      - name
      - team_conflicts
      - url
    AdjudicatorLinks:
      type: object
      properties:
        checkin:
          type: string
          format: uri
          readOnly: true
      required:
      - checkin
    Answer:
      type: object
      properties:
        question:
          type: string
          format: uri
        answer:
          anyOf:
          - type: number
          - type: boolean
          - type: string
          - type: array
            items:
              type: string
      required:
      - answer
      - question
    AnswerTypeEnum:
      enum:
      - bc
      - bs
      - i
      - is
      - f
      - t
      - tl
      - ss
      - ms
      - dt
      type: string
      description: |-
        * `bc` - checkbox
        * `bs` - yes/no (dropdown)
        * `i` - integer (textbox)
        * `is` - integer scale
        * `f` - float
        * `t` - text
        * `tl` - long text
        * `ss` - select one
        * `ms` - select multiple
        * `dt` - date + time
    AssignmentMethodEnum:
      enum:
      - hungarian
      - hungarian_preshuffled
      type: string
      description: |-
        * `hungarian` - Hungarian algorithm (not WUDC-compliant)
        * `hungarian_preshuffled` - Hungarian algorithm with preshuffling
    AvoidConflictsEnum:
      enum:
      - 'off'
      - one_up_one_down
      - graph
      - graph_one
      type: string
      description: |-
        * `off` - Off
        * `one_up_one_down` - One-up-one-down
        * `graph` - Minimum cost matching (pullups determined beforehand)
        * `graph_one` - Minimum cost matching (including pullups)
    Ballot:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        result:
          $ref: '#/components/schemas/Result'
        motion:
          type: string
          format: uri
        url:
          type: string
          format: uri
          readOnly: true
        participant_submitter:
          type: string
          format: uri
          nullable: true
        vetos:
          type: array
          items:
            $ref: '#/components/schemas/Veto'
          nullable: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        version:
          type: integer
          readOnly: true
        submitter_type:
          allOf:
          - $ref: '#/components/schemas/SubmitterTypeEnum'
          readOnly: true
        confirmed:
          type: boolean
        private_url:
          type: boolean
          readOnly: true
          title: From private URL
        confirm_timestamp:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        discarded:
          type: boolean
        single_adj:
          type: boolean
          title: Single adjudicator
          description: Whether this submission represents only the submitting adjudicator
            on a panel, when individual adjudicator ballots are enabled.
        forfeit:
          type: boolean
          description: Whether a team had forfeited the debate and so speaker scores
            were exceptionally not attributed.
        submitter:
          type: integer
          readOnly: true
          nullable: true
        confirmer:
          type: integer
          readOnly: true
          nullable: true
      required:
      - confirm_timestamp
      - confirmer
      - id
      - ip_address
      - private_url
      - result
      - submitter
      - submitter_type
      - timestamp
      - url
      - version
    BlankEnum:
      enum:
      - ''
    BreakCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        _links:
          allOf:
          - $ref: '#/components/schemas/BreakCategoryLinks'
          readOnly: true
          title: ' links'
        name:
          type: string
          description: Name to be displayed, e.g., "ESL"
          maxLength: 50
        slug:
          type: string
          description: Slug for URLs, e.g., "esl"
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        seq:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Sequence number
          description: The order in which the categories are displayed
        break_size:
          type: integer
          maximum: 2147483647
          minimum: 2
          description: Number of breaking teams in this category
        reserve_size:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Number of reserve teams in this category.
        is_general:
          type: boolean
          description: Are teams eligible for this break by default
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: If a team breaks in multiple categories, higher priority numbers
            take precedence; teams can break into multiple categories if and only
            if they all have the same priority
        limit:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: At most this many teams will be shown on the public tab for
            this category, or use 0 for no limit
        rule:
          allOf:
          - $ref: '#/components/schemas/RuleEnum'
          description: |-
            Rule for how the break is calculated (most tournaments should use "Standard")

            * `standard` - Standard
            * `aida-1996` - AIDA 1996
            * `aida-2016-easters` - AIDA 2016 (Easters)
            * `aida-2016-australs` - AIDA 2016 (Australs)
            * `aida-2019-australs-open` - AIDA 2019 (Australs, Dynamic Cap)
      required:
      - _links
      - break_size
      - id
      - is_general
      - name
      - priority
      - seq
      - slug
      - url
    BreakCategoryLinks:
      type: object
      properties:
        eligibility:
          type: string
          format: uri
          readOnly: true
        breaking_teams:
          type: string
          format: uri
          readOnly: true
      required:
      - breaking_teams
      - eligibility
    BreakEligibility:
      type: object
      properties:
        slug:
          type: string
          readOnly: true
          description: Slug for URLs, e.g., "esl"
          pattern: ^[-a-zA-Z0-9_]+$
        team_set:
          type: array
          items:
            type: string
            format: uri
      required:
      - slug
      - team_set
    BreakingTeam:
      type: object
      properties:
        team:
          type: string
          format: uri
        rank:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        break_rank:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        remark:
          nullable: true
          description: |-
            Used to explain why an otherwise-qualified team didn't break

            * `C` - Capped
            * `I` - Ineligible
            * `D` - Different break
            * `d` - Disqualified
            * `t` - Lost coin toss
            * `w` - Withdrawn
            * `R` - Reserve
            * `A` - Absent
          oneOf:
          - $ref: '#/components/schemas/RemarkEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
      required:
      - rank
      - team
    BrowserEnum:
      enum:
      - CHROME
      - FIREFOX
      - OPERA
      - EDGE
      - SAFARI
      type: string
      description: |-
        * `CHROME` - Chrome
        * `FIREFOX` - Firefox
        * `OPERA` - Opera
        * `EDGE` - Edge
        * `SAFARI` - Safari
    Checkin:
      type: object
      properties:
        object:
          type: string
          format: uri
          readOnly: true
        barcode:
          type: string
        checked:
          type: boolean
        timestamp:
          type: string
          format: date-time
      required:
      - barcode
      - checked
      - object
      - timestamp
    Coach:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        answers:
          type: array
          items:
            $ref: '#/components/schemas/Answer'
        name:
          type: string
          maxLength: 70
        last_name:
          type: string
          nullable: true
          description: The last name may be used for team names or code names
          maxLength: 70
        email:
          type: string
          format: email
          nullable: true
          title: Email address
          maxLength: 254
        phone:
          type: string
          maxLength: 40
        anonymous:
          type: boolean
          description: Anonymous persons will have their name and team redacted on
            public tab releases
        code_name:
          type: string
          description: Name used to obscure real name on public-facing pages
          maxLength: 25
        url_key:
          type: string
          nullable: true
          maxLength: 24
          pattern: ^[-a-zA-Z0-9_]+$
        gender:
          description: |-
            Gender is displayed in the adjudicator allocation interface, and nowhere else

            * `M` - male
            * `F` - female
            * `O` - other
          oneOf:
          - $ref: '#/components/schemas/GenderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        pronoun:
          type: string
          description: If printing ballots using Tabbycat, there is the option to
            pre-print pronouns
          maxLength: 10
      required:
      - id
      - name
    Criteria:
      type: object
      properties:
        criterion:
          type: string
          format: uri
        score:
          type: number
          format: double
      required:
      - criterion
      - score
    DebateAdjudicator:
      type: object
      properties:
        chair:
          type: string
          format: uri
        panellists:
          type: array
          items:
            type: string
            format: uri
        trainees:
          type: array
          items:
            type: string
            format: uri
      required:
      - chair
      - panellists
      - trainees
    DebateTeam:
      type: object
      properties:
        team:
          type: string
          format: uri
        side:
          anyOf:
          - type: number
          - type: string
            enum:
            - aff
            - neg
            - cg
            - co
            - bye
        flags:
          type: array
          items:
            $ref: '#/components/schemas/FlagsEnum'
          readOnly: true
      required:
      - flags
      - team
    DisplayInVenueNameEnum:
      enum:
      - '-'
      - P
      - S
      type: string
      description: |-
        * `-` - Don't display in room name
        * `P` - Display as prefix
        * `S` - Display as suffix
    DrawGeneration:
      type: object
      properties:
        draw_type:
          allOf:
          - $ref: '#/components/schemas/DrawTypeEnum'
          description: |-
            Which draw method to use

            * `R` - Random
            * `M` - Manual
            * `D` - Round-robin
            * `P` - Power-paired
            * `E` - Elimination
            * `S` - Seeded
        options:
          allOf:
          - $ref: '#/components/schemas/Options'
          description: Options for draw generation; defaults to tournament preferences
    DrawStatusEnum:
      enum:
      - N
      - D
      - C
      - T
      - R
      type: string
      description: |-
        * `N` - None
        * `D` - Draft
        * `C` - Confirmed
        * `T` - Teams released
        * `R` - Released
    DrawTypeEnum:
      enum:
      - R
      - M
      - D
      - P
      - E
      - S
      type: string
      description: |-
        * `R` - Random
        * `M` - Manual
        * `D` - Round-robin
        * `P` - Power-paired
        * `E` - Elimination
        * `S` - Seeded
