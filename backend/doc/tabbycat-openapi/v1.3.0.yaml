            application/json:
              schema:
                $ref: '#/components/schemas/V1Root'
          description: ''
  /api/v1/institutions:
    get:
      operationId: api_v1_institutions_list
      summary: List all institutions
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: region
        schema:
          type: string
        description: Only include institutions from the region
      tags:
      - institutions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInstitutionList'
          description: ''
    post:
      operationId: api_v1_institutions_create
      summary: Create institution
      tags:
      - institutions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Institution'
        required: true
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Institution'
          description: ''
