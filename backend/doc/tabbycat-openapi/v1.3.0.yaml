    get:
      operationId: api_retrieve
      description: API Entrypoint; info about versions
      summary: API root
      tags:
      - root
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Root'
          description: ''
  /api/v1:
    get:
      operationId: api_v1_retrieve
      description: Entrypoint for version 1 of the API
