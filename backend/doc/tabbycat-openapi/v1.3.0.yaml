openapi: 3.0.3
info:
  title: Tabbycat API
  version: 1.3.0
  x-logo:
    url: /static/logo.svg
    altText: Tabbycat logo
  description: Parliamentary debate tabulation software
  contact:
    name: Étienne Beaulé
    email: ebeaule@tabbycat-debate.org
  license:
    name: AGPL 3
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
paths:
