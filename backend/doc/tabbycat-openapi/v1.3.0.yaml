      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        adjudicators:
          allOf:
          - $ref: '#/components/schemas/DebateAdjudicator'
          nullable: true
        importance:
          $ref: '#/components/schemas/PreformedPanelImportanceEnum'
        bracket_min:
          type: number
          format: double
          title: Minimum bracket
          description: Estimate of the lowest bracket for which this panel might be
        bracket_max:
          type: number
          format: double
          title: Maximum bracket
          description: Estimate of the highest bracket for which this panel might
            be
        room_rank:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Sequential number of panel, not used in any algorithms
        liveness:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Number of categories this room is expected to be live for
      required:
      - id
      - url
    PreformedPanelImportanceEnum:
      enum:
      - -2.0
      - -1.0
      - 0.0
      - 1.0
      - 2.0
      type: number
      description: |-
        * `-2.0` - -2
        * `-1.0` - -1
        * `0.0` - 0
        * `1.0` - 1
        * `2.0` - 2
    PullupEnum:
      enum:
      - anywhere
      - one_room
      type: string
      description: |-
        * `anywhere` - Anywhere in bracket
        * `one_room` - All in the same room (not WUDC-compliant)
    PullupRestrictionEnum:
      enum:
      - none
      - least_to_date
      - lowest_ds_wins
      - lowest_ds_speaks
      type: string
      description: |-
        * `none` - No restriction
        * `least_to_date` - Choose from teams who have been pulled up the fewest times so far
        * `lowest_ds_wins` - Choose from teams with the lowest draw strength by wins so far
        * `lowest_ds_speaks` - Choose from teams with the lowest draw strength by speaks so far
    Question:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        url:
          type: string
          format: uri
          readOnly: true
        seq:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Sequence number
          description: The order in which questions are displayed
        text:
          type: string
          description: The question displayed to participants, e.g., "Did you agree
            with the decision?"
          maxLength: 255
        help_text:
          type: string
          description: Additional context for the question
        name:
          type: string
          description: A short name for the question, e.g., "Agree with decision"
          maxLength: 30
        answer_type:
          $ref: '#/components/schemas/AnswerTypeEnum'
        required:
          type: boolean
          description: Whether participants are required to fill out this field
        min_value:
          type: number
          format: double
          nullable: true
          title: Minimum value
          description: Minimum allowed value for numeric fields (ignored for text
            or boolean fields)
        max_value:
          type: number
          format: double
          nullable: true
          title: Maximum value
          description: Maximum allowed value for numeric fields (ignored for text
            or boolean fields)
        choices:
          type: array
          items:
            type: string
          description: Permissible choices for select one/multiple fields (ignored
            for other fields)
        for_content_type:
          type: integer
      required:
      - answer_type
      - for_content_type
      - id
      - name
      - seq
      - text
      - url
